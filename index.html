<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无相布施吉祥码与功德测算</title>
    <!-- 引入 LeanCloud SDK (用于实现全网实时数据同步) -->
    <script src="//cdn.jsdelivr.net/npm/leancloud-storage@4.13.2/dist/av-min.js"></script>
    <style>
        :root {
            --primary-color: #d35400; /* 佛教常用的赭石色 */
            --btn-color: #07c160;     /* 微信绿 */
            --bg-color: #fdfbf7;      /* 仿宣纸色 */
            --card-bg: #ffffff;
            --progress-bg: #e0e0e0;
            --progress-fill: #07c160;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            overflow: hidden;
            padding-bottom: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 20px 10px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }

        h2 { margin: 0; font-size: 20px; color: #222; }
        p.desc { font-size: 13px; color: #666; margin-top: 8px; line-height: 1.5; }

        /* --- 模块通用样式 --- */
        .module { padding: 0 25px; margin-bottom: 30px; }
        .divider { height: 1px; background: #f0f0f0; margin: 0 25px 25px; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            letter-spacing: 2px;
            box-sizing: border-box;
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary-color); }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            font-weight: bold;
        }
        button:active { opacity: 0.8; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* --- 吉祥码模块特定样式 --- */
        .btn-generate { background-color: var(--primary-color); color: white; }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #fcf6f0;
            border: 1px dashed var(--primary-color);
            border-radius: 8px;
            word-break: break-all;
            font-size: 18px;
            color: var(--primary-color);
            display: none;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
        }
        .tip { margin-top: 8px; font-size: 12px; color: #888; text-align: center; display: none; }

        /* --- 功德测算模块特定样式 --- */
        .range-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .range-btn {
            flex: 1;
            background: #f0f0f0;
            color: #555;
            font-size: 14px;
            padding: 10px 5px;
        }
        .range-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 2px 8px rgba(211, 84, 0, 0.3);
        }

        .donation-display {
            text-align: center;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .amount-big {
            font-size: 42px;
            font-weight: bold;
            color: #d35400;
            line-height: 1;
        }
        .amount-label { font-size: 14px; color: #999; margin-top: 5px; }
        .avg-hint {
            font-size: 13px;
            color: #666;
            margin-top: 10px;
            background: #fff8e1;
            padding: 8px 12px;
            border-radius: 6px;
            display: none;
            line-height: 1.5;
        }

        .action-area { display: flex; gap: 10px; }
        .btn-retry { background-color: #fff; border: 1px solid #ccc; color: #666; }
        .btn-confirm { background-color: var(--btn-color); color: white; }

        .status-msg {
            font-size: 12px;
            color: #d35400;
            margin-top: 10px;
            text-align: center;
            display: none;
            font-weight: bold;
        }

        /* --- 乐助项目认捐模块 (新增) --- */
        .project-card {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            border: 1px solid #eee;
            transition: transform 0.2s;
        }

        .project-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .project-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .progress-container {
            height: 8px;
            background-color: var(--progress-bg);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--progress-fill);
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .btn-donate-link {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #fff;
            border: 1px solid var(--btn-color);
            color: var(--btn-color);
            text-decoration: none;
            text-align: center;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            box-sizing: border-box;
        }

        .btn-donate-link:hover {
            background-color: #f0fff4;
        }

        /* 已完成状态 */
        .project-card.completed {
            opacity: 0.7;
            background-color: #f0f0f0;
        }
        .project-card.completed .btn-donate-link {
            border-color: #ccc;
            color: #999;
            background-color: #e0e0e0;
            pointer-events: none;
        }
        .completed-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #d35400;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            display: none;
        }
        .project-card.completed .completed-tag {
            display: block;
        }

    </style>
</head>
<body>

<div class="container">
    <!-- 顶部标题 -->
    <div class="header">
        <h2>🙏 无相布施助手</h2>
        <p class="desc">生成AMTF永相伴吉祥码 & 随缘选择乐助范围 & 请认准项目点击进入项目页面完成订单</p>
    </div>

    <!-- 模块一：吉祥码生成 -->
    <div class="module">
        <p style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">1. 获取吉祥码 (AMTF)</p>
        <input type="text" id="idSuffix" maxlength="3" placeholder="请输入身份证后三位(X用0替代)" oninput="this.value=this.value.replace(/[^0-9Xx]/g,'')">
        <button class="btn-generate" onclick="generateCode()">生成并复制吉祥码</button>

        <div id="resultBox" class="result-box"></div>
        <div id="tip" class="tip">✅ 已自动复制到剪贴板，请前往微信粘贴保存</div>
    </div>

    <div class="divider"></div>

    <!-- 模块二：功德金测算 -->
    <div class="module">
        <p style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">2. 测算随喜功德金</p>

        <div class="range-selector" id="rangeSelector">
            <button class="range-btn active" onclick="setRange(1, 50, this)">小额<br>1-50</button>
            <button class="range-btn" onclick="setRange(50, 300, this)">中额<br>50-300</button>
            <button class="range-btn" onclick="setRange(300, 1000, this)">大额<br>300-1000</button>
        </div>

        <div class="donation-display">
            <div id="placeholderText" style="color:#ccc;">选择范围后，点击下方按钮开始测算</div>
            <div id="resultArea" style="display:none;">
                <div class="amount-big">¥ <span id="currentAmount">0</span></div>
                <div class="amount-label">本次测算结果</div>
                <div id="avgHint" class="avg-hint"></div>
            </div>
        </div>

        <div id="statusMsg" class="status-msg"></div>

        <div class="action-area">
            <button id="btnRetry" class="btn-retry" style="display:none;" onclick="retryCalculation()">再算一次 (<span id="retryCount">2</span>)</button>
            <button id="btnStart" class="btn-confirm" onclick="startCalculation()">开始测算</button>
        </div>
    </div>

    <div class="divider"></div>

    <!-- 模块三：乐助项目认捐 (新增) -->
    <div class="module">
        <p style="font-size: 14px; font-weight: bold; margin-bottom: 15px;">3. 乐助项目认捐 (实时数据)</p>
        <div id="projectsContainer">
            <!-- 项目列表将通过 JS 动态生成 -->
            <div style="text-align:center; color:#999; padding:20px;">正在加载云端数据...</div>
        </div>
    </div>
</div>

<script>
    /* ==========================================
       配置区域：请在此处填入您的 LeanCloud 信息
       ========================================== */
    // 如果您没有 LeanCloud 账号，请先去 https://www.leancloud.cn/ 注册并创建一个应用
    // 将下方的 AppID 和 AppKey 替换为您自己的
    const LC_APP_ID = 'YOUR_LEANCLOUD_APP_ID';
    const LC_APP_KEY = 'YOUR_LEANCLOUD_APP_KEY';

    // 初始化 LeanCloud
    AV.init({
        appId: LC_APP_ID,
        appKey: LC_APP_KEY
    });

    /* ==========================================
       功能一：吉祥码生成逻辑
       ========================================== */
    function generateCode() {
        const suffix = document.getElementById('idSuffix').value.trim().toUpperCase();
        const resultBox = document.getElementById('resultBox');
        const tip = document.getElementById('tip');

        if (suffix.length !== 3) {
            alert("请输入准确的3位字符（数字或X）！");
            return;
        }

        let randomNums = '';
        for (let i = 0; i < 3; i++) {
            randomNums += Math.floor(Math.random() * 10);
        }

        let suffixArray = suffix.split('');
        for (let i = suffixArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [suffixArray[i], suffixArray[j]] = [suffixArray[j], suffixArray[i]];
        }
        const shuffledSuffix = suffixArray.join('');

        const allNums = randomNums + shuffledSuffix;
        const letters = ['A', 'M', 'T', 'F'];

        let distribution = [0, 0, 0, 0];
        for (let i = 0; i < 6; i++) {
            let box = Math.floor(Math.random() * 4);
            distribution[box]++;
        }

        let finalStr = '';
        let numIndex = 0;
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < distribution[i]; j++) {
                finalStr += allNums[numIndex++];
            }
            finalStr += letters[i];
        }
        while (numIndex < 6) {
            finalStr += allNums[numIndex++];
        }

        const finalCode = `无相布施者${finalStr}`;

        resultBox.textContent = finalCode;
        resultBox.style.display = 'block';
        tip.style.display = 'none';

        if (navigator.clipboard) {
            navigator.clipboard.writeText(finalCode).then(() => {
                tip.style.display = 'block';
            }).catch(err => {
                console.error('复制失败', err);
            });
        }
    }

    /* ==========================================
       功能二：功德金测算逻辑
       ========================================== */
    let currentMin = 1;
    let currentMax = 50;
    let attempts = 0;
    let historyAmounts = [];
    const MAX_ATTEMPTS = 3;
    const COOLDOWN_KEY = 'donation_cooldown_time';
    const COOLDOWN_DURATION = 24 * 60 * 60 * 1000;

    window.onload = function() {
        checkCooldown();
        loadProjects(); // 页面加载时加载乐助项目
    };

    function checkCooldown() {
        const lastTime = localStorage.getItem(COOLDOWN_KEY);
        if (lastTime) {
            const now = new Date().getTime();
            if (now - parseInt(lastTime) < COOLDOWN_DURATION) {
                lockInterface("今日测算次数已用完，请等待24小时后再来");
            } else {
                localStorage.removeItem(COOLDOWN_KEY);
                resetDonationUI();
            }
        }
    }

    function setRange(min, max, btnElement) {
        if (document.getElementById('btnStart').disabled) return;
        document
