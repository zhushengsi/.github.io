<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>头陀村经营收款通道 - 无相布施</title>
    <style>
        :root {
            --primary-color: #2e7d32; /* 沉稳深绿 */
            --accent-color: #4caf50;  /* 亮绿点缀 */
            --bg-color: #f4f9f4;      /* 极淡绿背景 */
            --text-main: #333333;
            --text-sub: #666666;
            --card-bg: #ffffff;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(46, 125, 50, 0.08);
            overflow: hidden;
            padding-bottom: 30px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .header p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: var(--primary-color);
            margin-right: 8px;
            border-radius: 2px;
        }

        /* 吉祥码展示区 */
        .lucky-code-box {
            background: #f0fdf4;
            border: 1px dashed var(--accent-color);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        .code-display {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 2px;
            margin: 10px 0;
            font-family: monospace;
        }

        /* 按钮通用样式 */
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-wechat {
            background-color: #07c160;
            color: white;
        }

        .btn-alipay {
            background-color: #1677ff;
            color: white;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* 输入框样式 */
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .result-box {
            background: #fafafa;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 10px;
        }

        /* 底部版权 */
        .footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 头部 -->
    <div class="header">
        <h1>头陀村经营收款通道</h1>
        <p>随喜功德 · 无相布施 · 实物资助</p>
    </div>

    <!-- 模块一：吉祥码生成 -->
    <div class="section">
        <div class="section-title">第一步：获取您的专属吉祥码</div>
        <div class="lucky-code-box">
            <div style="font-size: 12px; color: #666;">点击下方按钮生成随机吉祥码</div>
            <div id="luckyCodeDisplay" class="code-display">------</div>
        </div>
        <button class="btn btn-primary" onclick="generateLuckyCode()">🎲 生成/刷新吉祥码</button>
        <button class="btn btn-outline" onclick="copyCodeManual()">📋 仅复制吉祥码 (用于支付宝)</button>
    </div>

    <!-- 模块二：功德金测算 -->
    <div class="section">
        <div class="section-title">第二步：功德金测算 (可选)</div>
        <input type="number" id="incomeInput" placeholder="请输入今日收入金额 (元)">
        <button class="btn btn-outline" onclick="calculateMerit()">🧮 测算建议功德金</button>
        <div id="meritResult" class="result-box" style="display:none;"></div>
    </div>

    <!-- 模块三：支付通道 -->
    <div class="section">
        <div class="section-title">第三步：选择支付方式</div>
        
        <!-- 微信支付 -->
        <button class="btn btn-wechat" onclick="handleWechatPay()">
            💚 微信支付 (自动填入吉祥码)
        </button>
        
        <!-- 支付宝支付 -->
        <button class="btn btn-alipay" onclick="handleAlipay()">
            💙 支付宝支付 (需手动粘贴吉祥码)
        </button>
        <div style="font-size: 12px; color: #999; text-align: center; margin-top: 5px;">
            *支付宝请在备注栏粘贴上方生成的吉祥码
        </div>
    </div>

    <!-- 模块四：实物资助 -->
    <div class="section">
        <div class="section-title">其他：实物资助登记</div>
        <input type="text" id="addressInput" placeholder="请输入您的收货地址">
        <button class="btn btn-outline" onclick="submitAddress()">📦 提交地址领取经书/物资</button>
    </div>

    <div class="footer">
        © 头陀村 | 愿以此功德，普及于一切
    </div>
</div>

<script>
    // ==========================================
    // 全局变量区
    // ==========================================
    let currentLuckyCode = ""; // 存储当前生成的吉祥码

    // ==========================================
    // 模块一：吉祥码逻辑
    // ==========================================
    function generateLuckyCode() {
        // 生成6位随机数字或字母组合
        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        let result = '';
        for (let i = 0; i < 6; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        
        currentLuckyCode = result;
        document.getElementById('luckyCodeDisplay').innerText = result;
        
        // 简单的动画反馈
        const display = document.getElementById('luckyCodeDisplay');
        display.style.transform = "scale(1.1)";
        setTimeout(() => display.style.transform = "scale(1)", 200);
    }

    // 手动复制功能 (主要用于支付宝场景)
    function copyCodeManual() {
        if (!currentLuckyCode) {
            alert("请先生成吉祥码！");
            return;
        }
        
        // 尝试使用现代API
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(currentLuckyCode).then(() => {
                alert("复制成功：" + currentLuckyCode);
            }).catch(err => {
                fallbackCopy(currentLuckyCode);
            });
        } else {
            fallbackCopy(currentLuckyCode);
        }
    }

    // 降级复制方案 (兼容旧浏览器)
    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; 
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            alert("复制成功：" + text);
        } catch (err) {
            alert("复制失败，请长按吉祥码手动复制");
        }
        document.body.removeChild(textArea);
    }

    // ==========================================
    // 模块二：功德测算逻辑
    // ==========================================
    function calculateMerit() {
        const income = parseFloat(document.getElementById('incomeInput').value);
        const resultBox = document.getElementById('meritResult');
        
        if (!income || income <= 0) {
            resultBox.style.display = 'block';
            resultBox.innerText = "请输入有效的收入金额";
            return;
        }

        // 简单的测算逻辑：收入的 1% - 10%
        const min = (income * 0.01).toFixed(2);
        const max = (income * 0.10).toFixed(2);
        
        resultBox.style.display = 'block';
        resultBox.innerHTML = `建议随喜金额：<span style="color:#d32f2f;font-weight:bold">${min}元 - ${max}元</span><br>心诚则灵，量力而行。`;
    }

    // ==========================================
    // 模块三：支付跳转逻辑
    // ==========================================
    
    // 微信支付处理
    function handleWechatPay() {
        if (!currentLuckyCode) {
            alert("为了记录功德，请先点击上方按钮生成吉祥码！");
            return;
        }

        // 核心修改点：将吉祥码拼接到 URL 参数中
        // 假设您的付款页是 index2.html 或具体的收款链接
        // 这里演示跳转到 index2.html 并带上 code 参数
        const targetUrl = `index2.html?code=${currentLuckyCode}`; 
        
        // 也可以直接跳转到具体的微信收款小程序链接（如果已知）
        // const wechatScheme = `weixin://...&params=${currentLuckyCode}`; 

        console.log("正在跳转至:", targetUrl);
        window.location.href = targetUrl;
    }

    // 支付宝支付处理
    function handleAlipay() {
        if (!currentLuckyCode) {
            alert("请先生成吉祥码，以便在支付宝备注中填写！");
            return;
        }
        
        // 支付宝通常无法通过 URL 传参给个人收款码，所以引导用户复制
        const confirmPay = confirm(`即将打开支付宝。\n\n您的吉祥码是：${currentLuckyCode}\n\n点击确定后会自动复制，请在付款备注中粘贴。`);
        
        if (confirmPay) {
            copyCodeManual(); // 自动触发复制
            
            // 模拟跳转支付宝（实际需替换为真实的支付宝二维码链接或 Scheme）
            // 这里用延时跳转给用户一点反应时间
            setTimeout(() => {
                // 示例：跳转到支付宝扫码页或您的收款码图片页
                // window.location.href = "alipays://platformapi/startapp?appId=20000067&url=..."; 
                alert("已复制吉祥码，请在支付宝付款页面的【添加备注】中粘贴。");
            }, 500);
        }
    }

    // ==========================================
    // 模块四：地址提交逻辑
    // ==========================================
    function submitAddress() {
        const addr = document.getElementById('addressInput').value;
        if (!addr) {
            alert("请填写地址");
            return;
        }
        alert("地址提交成功：" + addr + "\n我们将尽快为您安排寄送。");
        // 此处可接入后端 API 提交数据
    }

    // 初始化
    window.onload = function() {
        // 页面加载时自动生成一个码，提升体验
        generateLuckyCode();
    };
</script>

</body>
</html>
